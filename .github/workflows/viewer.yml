name: viewer

# Only runs when the Tauri crate or its direct dep (braid-config) change.
# Backend-only changes (braid, braid-core, xtask) never trigger this.
on:
  push:
    branches: [main]
    paths:
      - "crates/braid-viewer/**"
      - "crates/braid-config/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "crates/braid-viewer/**"
      - "crates/braid-config/**"
      - "Cargo.toml"
      - "Cargo.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Smoke-build braid-viewer across all supported OS + ubuntu-22.04 (LTS
  # WebKitGTK floor). Uses -p braid-viewer rather than --workspace so Cargo
  # reads default-members and skips unrelated crates.
  build:
    name: viewer build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: viewer-${{ matrix.os }}
      - name: Install Linux WebKit dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev build-essential
      - run: cargo build -p braid-viewer
