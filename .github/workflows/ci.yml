name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test & clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Build everything first so `cargo test` never relinks the braid
      # binary while assert_cmd e2e tests are spawning it (see strand
      # br-cache-flake for the class of race this avoids). Tests need no
      # network: sync e2e tests run an in-process server on TCP loopback.
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
