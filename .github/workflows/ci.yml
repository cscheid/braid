name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test & clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      # The installer tests hard-require minisign (signature verification
      # is part of the artifact contract; a skip would unguard it).
      - name: Install minisign
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install minisign
          else
            sudo apt-get update && sudo apt-get install -y minisign
          fi
      # This job is mirrored locally by `cargo xtask ci` (crates/xtask) —
      # keep the two in sync.
      - run: cargo fmt --all --check
      # Build everything first so `cargo test` never relinks the braid
      # binary while assert_cmd e2e tests are spawning it (see strand
      # br-cache-flake for the class of race this avoids). Tests need no
      # network: sync e2e tests run an in-process server on TCP loopback.
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Windows (x86_64-pc-windows-msvc) build + test. minisign is not needed:
  # the install.sh tests are cfg(unix) (they run bash and shell shims), so
  # they compile out here. `run:` defaults to PowerShell on this runner, but
  # the cargo invocations are shell-agnostic. No env_clear concerns in CI
  # itself — only the e2e harnesses touch the environment.
  windows:
    name: test & clippy (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows
      # Build-first for the same assert_cmd relink-race reason as the unix job.
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Exercise install.ps1 end to end without a published release: zip the
      # just-built braid.exe, then install it from that local artifact with
      # checksum verification. Mirrors how tests/installer.rs proves
      # install.sh offline. (The release.yml zip/sign path is exercised at
      # tag time.)
      - name: Smoke-test install.ps1 (offline)
        shell: pwsh
        run: |
          $dir = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP 'ps-smoke')
          $zip = Join-Path $dir 'braid-0.0.0-test-windows_amd64.zip'
          Compress-Archive -Path 'target/debug/braid.exe' -DestinationPath $zip
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          $dest = Join-Path $dir 'bin'
          ./install.ps1 -ArtifactUrl $zip -Checksum $hash -Dest $dest
          $out = & (Join-Path $dest 'braid.exe') --version
          if ($out -notmatch '^braid ') { Write-Error "unexpected --version output: $out"; exit 1 }
          Write-Host "install.ps1 smoke test OK: $out"
          # A wrong checksum must be rejected.
          $bad = '0' * 64
          $failed = $false
          try { ./install.ps1 -ArtifactUrl $zip -Checksum $bad -Dest $dest } catch { $failed = $true }
          if (-not $failed) { Write-Error 'install.ps1 accepted a bad checksum'; exit 1 }
          Write-Host 'install.ps1 rejects a bad checksum: OK'

  # Gate for the static-musl release targets (see
  # claude-notes/plans/2026/06/04/installer.md): musl breakage tends to
  # hide in transitive deps (native-tls→openssl was ours; libc::statx was
  # beads_rust's), so build AND run the full suite against musl. The
  # binaries are fully static, so they run natively on the glibc runner.
  # aarch64-musl is exercised by the release workflow on an arm runner.
  musl:
    name: test (x86_64 musl static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      # musl-tools for the build; minisign for the installer tests.
      - run: sudo apt-get update && sudo apt-get install -y musl-tools minisign
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      # Build-first for the same assert_cmd relink-race reason as above.
      - run: cargo build --workspace --all-targets --target x86_64-unknown-linux-musl
      - run: cargo test --workspace --target x86_64-unknown-linux-musl
