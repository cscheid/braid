# Release pipeline: tag push (or manual dispatch on an existing tag) →
# 4-target binary build → checksummed artifacts → GitHub Release.
#
# The artifact naming and checksum layout is a contract with install.sh
# (and is what crates/braid/tests/bootstrap_sh.rs encodes):
#
#   braid-<version>-<platform>.tar.gz          single member: braid
#   braid-<version>-<platform>.tar.gz.sha256   "<sha256>  <filename>"
#   braid-<version>-<platform>.tar.gz.minisig  minisign (Ed25519) signature;
#                                              trusted comment = the archive
#                                              filename (replay protection —
#                                              install.sh compares it)
#   checksums.sha256                           all .sha256 lines, combined
#
# <version> has no "v" prefix in filenames; the tag does (v0.1.0 →
# braid-0.1.0-darwin_arm64.tar.gz). Linux binaries are statically linked
# musl, so one artifact per arch runs on every distro, Alpine included —
# and the CI musl job has already gated the suite against that target.
#
# Signing key: MINISIGN_SECRET_KEY repo secret; the public half is pinned
# in install.sh (MINISIGN_PUBKEY) and README. The sign step verifies its
# output against the key extracted from install.sh, so a secret/pinned-key
# mismatch fails the release instead of shipping unverifiable artifacts.
#
# Plans: claude-notes/plans/2026/06/04/installer.md (strand br-iju0n3gd),
#        claude-notes/plans/2026/06/04/minisign-signing.md (br-dgvi0nme)

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)release, e.g. v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          # On workflow_dispatch the default ref is the branch; build
          # from the requested tag so artifacts match what we verify.
          ref: ${{ github.event.inputs.tag || github.ref }}
      - id: version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "v$CARGO_VERSION" != "$TAG" ]; then
            echo "::error::tag $TAG does not match workspace Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (version $CARGO_VERSION)"

  build:
    name: Build (${{ matrix.platform }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux_amd64
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            ext: tar.gz
          - platform: linux_arm64
            target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            ext: tar.gz
          - platform: darwin_amd64
            target: x86_64-apple-darwin
            os: macos-15  # arm64 runner; the x86_64 binary runs under Rosetta
            ext: tar.gz
          - platform: darwin_arm64
            target: aarch64-apple-darwin
            os: macos-15
            ext: tar.gz
          - platform: windows_amd64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Defender real-time scanning inspects every object/rlib/exe the
      # compiler writes; excluding the workspace cuts the MSVC build time
      # markedly (the Windows job runs ~5x longer than the Unix matrix).
      - name: Exclude workspace from Defender scanning
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p braid

      # Every target in the matrix can execute on its runner (musl
      # binaries are static; darwin x86_64 runs under Rosetta; windows runs
      # natively), so the version check is unconditional. `shell: bash` uses
      # Git Bash on the windows runner so this one script serves all OSes.
      - name: Verify binary reports the tag's version
        shell: bash
        run: |
          BIN="./target/${{ matrix.target }}/release/braid"
          [ "$RUNNER_OS" = "Windows" ] && BIN="$BIN.exe"
          RAW=$("$BIN" --version)
          ACTUAL="${RAW##* }"
          if [ "$ACTUAL" != "${{ needs.preflight.outputs.version }}" ]; then
            echo "::error::binary reports '$RAW', expected version ${{ needs.preflight.outputs.version }}"
            exit 1
          fi

      # Unix targets ship a .tar.gz of the `braid` binary.
      - name: Package archive + checksum (tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE="braid-${{ needs.preflight.outputs.version }}-${{ matrix.platform }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" braid
          if command -v sha256sum >/dev/null; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
            sha256sum -c "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
            shasum -a 256 -c "$ARCHIVE.sha256"
          fi

      # Windows ships a .zip of braid.exe (the format Windows users and
      # Scoop/WinGet expect). The .sha256 is written in GNU coreutils format
      # ("<lowercase-hash>  <file>", LF-terminated, no BOM) so the ubuntu
      # combine job's `sha256sum -c` accepts it alongside the unix lines.
      - name: Package archive + checksum (zip)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $version = "${{ needs.preflight.outputs.version }}"
          $archive = "braid-$version-${{ matrix.platform }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/braid.exe" -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          [System.IO.File]::WriteAllText((Join-Path (Get-Location) "$archive.sha256"), "$hash  $archive`n")

      - name: Install minisign
        if: runner.os != 'Windows'
        shell: bash
        run: |
          case "$RUNNER_OS" in
            macOS)  brew install minisign ;;
            Linux)  sudo apt-get update && sudo apt-get install -y minisign ;;
          esac

      # Trusted comment = archive filename: it is part of the signed
      # payload, and install.sh compares it against the file they asked
      # for, so a signature cannot be replayed from another artifact.
      # Skipped for Windows: install.ps1 does not verify signatures (SHA-256
      # only), so the .zip has no .minisig consumer today.
      - name: Sign archive (minisign, Ed25519)
        if: runner.os != 'Windows'
        shell: bash
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          ARCHIVE="braid-${{ needs.preflight.outputs.version }}-${{ matrix.platform }}.${{ matrix.ext }}"
          key="$(mktemp)"
          trap 'rm -f "$key"' EXIT
          chmod 600 "$key"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$key"
          minisign -Sm "$ARCHIVE" -s "$key" -t "$ARCHIVE"
          # Verify with the public key pinned in install.sh: a mismatch
          # between the repo secret and the pinned key fails the release
          # here instead of shipping artifacts no installer can verify.
          PUBKEY="$(sed -n 's/^MINISIGN_PUBKEY="\(.*\)"$/\1/p' install.sh)"
          test -n "$PUBKEY"
          minisign -Vm "$ARCHIVE" -P "$PUBKEY"

      # Unix archives include a .minisig; the Windows zip does not (no consumer).
      - uses: actions/upload-artifact@v7
        if: matrix.ext == 'tar.gz'
        with:
          name: braid-${{ matrix.platform }}
          path: |
            braid-${{ needs.preflight.outputs.version }}-${{ matrix.platform }}.tar.gz
            braid-${{ needs.preflight.outputs.version }}-${{ matrix.platform }}.tar.gz.sha256
            braid-${{ needs.preflight.outputs.version }}-${{ matrix.platform }}.tar.gz.minisig
          retention-days: 7
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: matrix.ext == 'zip'
        with:
          name: braid-${{ matrix.platform }}
          path: |
            braid-${{ needs.preflight.outputs.version }}-${{ matrix.platform }}.zip
            braid-${{ needs.preflight.outputs.version }}-${{ matrix.platform }}.zip.sha256
          retention-days: 7
          if-no-files-found: error

  viewer:
    name: Viewer bundle (${{ matrix.platform }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin_arm64
            target: aarch64-apple-darwin
            os: macos-15
            bundles: dmg
          - platform: darwin_amd64
            target: x86_64-apple-darwin
            os: macos-15
            bundles: dmg
          - platform: windows_amd64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            bundles: nsis
          - platform: linux_amd64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            bundles: deb,appimage
          - platform: linux_arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            bundles: deb,appimage
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install Linux WebKit dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev build-essential
      - uses: Swatinem/rust-cache@v2
        with:
          key: viewer-release-${{ matrix.target }}
      # cache-bin (rust-cache default) persists this across runs.
      - name: Install tauri-cli
        run: cargo install tauri-cli --version '^2' --locked
      - name: Install UI deps
        run: npm ci
        working-directory: ui
      - name: Build viewer bundle
        run: cargo xtask viewer-build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
      - name: Collect bundles and verify version
        shell: bash
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          mkdir -p viewer-dist
          shopt -s nullglob
          files=( "$BUNDLE_DIR"/dmg/*.dmg \
                  "$BUNDLE_DIR"/nsis/*-setup.exe \
                  "$BUNDLE_DIR"/deb/*.deb \
                  "$BUNDLE_DIR"/appimage/*.AppImage )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no bundles found under $BUNDLE_DIR"; exit 1
          fi
          for f in "${files[@]}"; do
            base="$(basename "$f")"
            case "$base" in
              *"$VERSION"*) ;;
              *) echo "::error::bundle '$base' missing version $VERSION (drift?)"; exit 1 ;;
            esac
            cp "$f" "viewer-dist/$base"
          done
          echo "staged:"; ls -1 viewer-dist
      - uses: actions/upload-artifact@v7
        with:
          name: braid-viewer-${{ matrix.platform }}
          path: viewer-dist/*
          retention-days: 7
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [preflight, build, viewer]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0  # changelog needs the previous tag

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Validate all platforms present, combine and verify checksums
        run: |
          cd artifacts
          VERSION="${{ needs.preflight.outputs.version }}"
          MISSING=()
          # "<platform>:<ext>" — Windows ships .zip, the rest .tar.gz.
          # The .zip has no .minisig: install.ps1 does not verify signatures.
          for entry in linux_amd64:tar.gz linux_arm64:tar.gz \
                       darwin_amd64:tar.gz darwin_arm64:tar.gz \
                       windows_amd64:zip; do
            platform="${entry%%:*}"; ext="${entry##*:}"
            required=("braid-${VERSION}-${platform}.${ext}" \
                      "braid-${VERSION}-${platform}.${ext}.sha256")
            [ "$ext" != "zip" ] && required+=("braid-${VERSION}-${platform}.${ext}.minisig")
            for f in "${required[@]}"; do
              [ -f "$f" ] || MISSING+=("$f")
            done
          done
          # braid-viewer GUI bundles (unsigned; integrity-only checksums).
          # Tauri default names — arch tokens differ per format by design.
          for f in \
            "braid-viewer_${VERSION}_aarch64.dmg" \
            "braid-viewer_${VERSION}_x64.dmg" \
            "braid-viewer_${VERSION}_x64-setup.exe" \
            "braid-viewer_${VERSION}_amd64.AppImage" \
            "braid-viewer_${VERSION}_amd64.deb" \
            "braid-viewer_${VERSION}_aarch64.AppImage" \
            "braid-viewer_${VERSION}_arm64.deb"; do
            [ -f "$f" ] || MISSING+=("$f")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::missing release files: ${MISSING[*]}"
            exit 1
          fi
          cat -- *.sha256 | sort -k2 > checksums.sha256
          sha256sum -c checksums.sha256
          cat checksums.sha256
          sha256sum braid-viewer_* > SHA256SUMS-viewer
          sha256sum -c SHA256SUMS-viewer
          cat SHA256SUMS-viewer

      - name: Generate release notes
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
          {
            echo "## Install"
            echo
            echo '```sh'
            echo "curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/install.sh | bash"
            echo '```'
            echo
            echo "On Windows (PowerShell):"
            echo
            echo '```powershell'
            echo "irm https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/install.ps1 | iex"
            echo '```'
            echo
            echo "Or with cargo: \`cargo install --git https://github.com/${GITHUB_REPOSITORY} --tag ${TAG} braid\`"
            echo
            echo "| Platform | File |"
            echo "|---|---|"
            echo "| Linux x86_64 (static musl) | \`braid-${VERSION}-linux_amd64.tar.gz\` |"
            echo "| Linux ARM64 (static musl) | \`braid-${VERSION}-linux_arm64.tar.gz\` |"
            echo "| macOS Intel | \`braid-${VERSION}-darwin_amd64.tar.gz\` |"
            echo "| macOS Apple Silicon | \`braid-${VERSION}-darwin_arm64.tar.gz\` |"
            echo "| Windows x86_64 | \`braid-${VERSION}-windows_amd64.zip\` |"
            echo
            echo "**Verify a manual download** (Unix archives are signed with [minisign](https://jedisct1.github.io/minisign/), Ed25519):"
            echo
            echo '```sh'
            echo "minisign -Vm braid-${VERSION}-<platform>.tar.gz -P RWSbWhSzVkkTRO4nFMzL/KyRs9oicbgy/2KPRK+o9hxznRYx9ZkHwwlN"
            echo '```'
            echo
            echo "The trusted comment should name exactly the file you downloaded."
            echo "Checksums (all platforms): \`sha256sum -c checksums.sha256 --ignore-missing\`"
            echo
            echo "## Desktop viewer (braid-viewer)"
            echo
            echo "Unsigned GUI bundles — first launch:"
            echo "- macOS: right-click the app -> Open (Gatekeeper), or \`xattr -d com.apple.quarantine <app>\`."
            echo "- Windows: the installer is unsigned -> SmartScreen -> More info -> Run anyway."
            echo
            echo "| Platform | File |"
            echo "|---|---|"
            echo "| macOS Apple Silicon | \`braid-viewer_${VERSION}_aarch64.dmg\` |"
            echo "| macOS Intel | \`braid-viewer_${VERSION}_x64.dmg\` |"
            echo "| Windows x86_64 | \`braid-viewer_${VERSION}_x64-setup.exe\` |"
            echo "| Linux x86_64 (AppImage) | \`braid-viewer_${VERSION}_amd64.AppImage\` |"
            echo "| Linux x86_64 (deb) | \`braid-viewer_${VERSION}_amd64.deb\` |"
            echo "| Linux ARM64 (AppImage) | \`braid-viewer_${VERSION}_aarch64.AppImage\` |"
            echo "| Linux ARM64 (deb) | \`braid-viewer_${VERSION}_arm64.deb\` |"
            echo "Viewer checksums: \`sha256sum -c SHA256SUMS-viewer --ignore-missing\`"
            echo
            echo "## Changes"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log --pretty='- %s (%h)' "${PREV_TAG}..${TAG}"
            else
              git log --pretty='- %s (%h)' "$TAG"
            fi
          } > notes.md
          cat notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          PRERELEASE=()
          case "$TAG" in *-*) PRERELEASE=(--prerelease) ;; esac
          gh release create "$TAG" \
            --title "braid $TAG" \
            --notes-file notes.md \
            --verify-tag \
            "${PRERELEASE[@]}" \
            artifacts/braid-*.tar.gz artifacts/braid-*.tar.gz.sha256 \
            artifacts/braid-*.tar.gz.minisig \
            artifacts/braid-*.zip artifacts/braid-*.zip.sha256 \
            artifacts/braid-viewer_* artifacts/SHA256SUMS-viewer \
            artifacts/checksums.sha256
